<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>FastAPI Frontend Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
      
    }

    .container {
      width: 400px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background-color: #222;
      color: white;
      border: none;
    }

    pre {
      background: #eee;
      padding: 10px;
      white-space: pre-wrap;
    }
    h3{
        color:hotpink;
    }
  </style>
</head>
<body>
    <center>
  <div class="container">
    <h2>FastAPI Feedback Form</h2>

    <input id="studentName" placeholder="Student Name">
    <input id="topic" placeholder="Topic">
    <input id="rating" type="number" placeholder="Rating 1 to 5">
    <textarea id="comment" placeholder="Comment"></textarea>

    <button onclick="submitFeedback()">Submit Feedback</button>

    <h3>Response</h3>
    <pre id="output"></pre>
  </div>
    </center>
  <script>
  async function submitFeedback() {
    const studentName = document.getElementById("studentName").value.trim();
    const topic = document.getElementById("topic").value.trim();
    const ratingValue = document.getElementById("rating").value.trim();
    const comment = document.getElementById("comment").value.trim();

    if (!studentName || !topic || !ratingValue || !comment) {
      document.getElementById("output").textContent = "Please fill in all details.";
      return;
    }

    const rating = Number(ratingValue);
    if (Number.isNaN(rating) || rating < 1 || rating > 5) {
      document.getElementById("output").textContent = "Rating must be between 1 and 5.";
      return;
    }

    const feedbackData = {
      student_name: studentName,
      topic: topic,
      rating: rating,
      comment: comment
    };

    try {
      const response = await fetch("http://127.0.0.1:8000/feedback", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(feedbackData)
      });

      const result = await response.json();

      if (response.ok) {
        document.getElementById("output").textContent = "Details entered successfully";
      } else {
        document.getElementById("output").textContent =
          "Status Code: " + response.status + "\n\n" +
          JSON.stringify(result, null, 2);
      }
    } catch (error) {
      document.getElementById("output").textContent = "Error: " + error.message;
    }
  }
</script>
 

</body></html>
