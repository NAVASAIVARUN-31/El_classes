<html>
<head>
    <title>Ask My Notes</title>  
</head>
<body>
    <h1>Ask My Notes</h1>  
    <h2>Upload Notes</h2>   
     choose file to upload: <input type="file" name="fileToUpload" id="fileToUpload">
    <h3>Ask a Question</h3>
    <form action="/submit_question" method="POST">
        <label for="question">Enter your question:</label><br><br>
        <textarea id="question" name="question" rows="6" cols="50" required></textarea><br><br>
        <input type="submit" value="Submit Question">
    </form>
    <b>Answer</b>
    <p id="answer">Your AI-generated answer will appear here.</p>
<p>Ask My Notes Capstone Project</p>
 
</body>
</html>
